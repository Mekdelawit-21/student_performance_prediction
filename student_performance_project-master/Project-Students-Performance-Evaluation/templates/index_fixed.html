<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Evaluation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: none;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
        }
        .result-display {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-top: 2rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-body p-5">
                <h1 class="text-center mb-4">
                    <i class="fas fa-graduation-cap me-2"></i>
                    Student Performance Evaluation
                </h1>
                <p class="text-center text-muted mb-4">
                    Enter your academic details to predict final exam performance
                </p>

                <form id="predictionForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="study_hours" class="form-label">
                                <i class="fas fa-clock me-2"></i>Daily Study Hours
                            </label>
                            <input type="number" class="form-control" id="study_hours" 
                                   min="1" max="12" step="0.5" value="4" required>
                        </div>

                        <div class="col-md-6">
                            <label for="prev_exam_score" class="form-label">
                                <i class="fas fa-chart-bar me-2"></i>Previous Exam Score
                            </label>
                            <input type="number" class="form-control" id="prev_exam_score" 
                                   min="0" max="100" value="65" required>
                        </div>

                        <div class="col-md-6">
                            <label for="attendance_rate" class="form-label">
                                <i class="fas fa-user-check me-2"></i>Attendance Rate
                            </label>
                            <input type="number" class="form-control" id="attendance_rate" 
                                   min="0.5" max="1" step="0.01" value="0.8" required>
                        </div>

                        <div class="col-md-6">
                            <label for="assignment_score" class="form-label">
                                <i class="fas fa-tasks me-2"></i>Assignment Score
                            </label>
                            <input type="number" class="form-control" id="assignment_score" 
                                   min="0" max="100" value="70" required>
                        </div>

                        <div class="col-md-6">
                            <label for="sleep_hours" class="form-label">
                                <i class="fas fa-bed me-2"></i>Sleep Hours
                            </label>
                            <input type="number" class="form-control" id="sleep_hours" 
                                   min="4" max="10" step="0.5" value="7" required>
                        </div>

                        <div class="col-md-6">
                            <label for="stress_level" class="form-label">
                                <i class="fas fa-brain me-2"></i>Stress Level (1-10)
                            </label>
                            <input type="number" class="form-control" id="stress_level" 
                                   min="1" max="10" value="5" required>
                        </div>

                        <div class="col-md-6">
                            <label for="social_activities" class="form-label">
                                <i class="fas fa-users me-2"></i>Social Activities/Week
                            </label>
                            <input type="number" class="form-control" id="social_activities" 
                                   min="0" max="20" value="5" required>
                        </div>

                        <div class="col-md-6">
                            <label for="previous_gpa" class="form-label">
                                <i class="fas fa-award me-2"></i>Previous GPA
                            </label>
                            <input type="number" class="form-control" id="previous_gpa" 
                                   min="2" max="4" step="0.1" value="3.0" required>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-magic me-2"></i>Predict Performance
                        </button>
                    </div>
                </form>

                <div id="result" class="result-display">
                    <h3 class="text-center">Prediction Results</h3>
                    <div class="text-center">
                        <h2 id="predictedScore">-</h2>
                        <p id="performanceLevel">-</p>
                    </div>
                    <div id="shapExplanation" class="mt-3">
                        <h5>Feature Importance:</h5>
                        <div id="shapValues"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('predictionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            predictPerformance();
        });

        function predictPerformance() {
            const data = {
                study_hours: parseFloat(document.getElementById('study_hours').value),
                prev_exam_score: parseFloat(document.getElementById('prev_exam_score').value),
                attendance_rate: parseFloat(document.getElementById('attendance_rate').value),
                assignment_score: parseFloat(document.getElementById('assignment_score').value),
                sleep_hours: parseFloat(document.getElementById('sleep_hours').value),
                stress_level: parseFloat(document.getElementById('stress_level').value),
                social_activities: parseFloat(document.getElementById('social_activities').value),
                previous_gpa: parseFloat(document.getElementById('previous_gpa').value)
            };

            fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.error) {
                    alert('Error: ' + result.error);
                } else {
                    displayResults(result);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while making the prediction.');
            });
        }

        function displayResults(result) {
            const score = result.predicted_value;
            let performance = '';
            
            if (score >= 80) performance = 'Excellent Performance! 🌟';
            else if (score >= 70) performance = 'Good Performance! 👍';
            else if (score >= 60) performance = 'Average Performance 😐';
            else performance = 'Needs Improvement 📈';

            document.getElementById('predictedScore').textContent = score.toFixed(1) + '/100';
            document.getElementById('performanceLevel').textContent = performance;
            
            // Display SHAP values if available
            if (result.shap_values) {
                const features = [
                    'Study Hours', 'Previous Exam Score', 'Attendance Rate', 
                    'Assignment Score', 'Sleep Hours', 'Stress Level', 
                    'Social Activities', 'Previous GPA'
                ];
                
                let shapHtml = '<div class="row">';
                features.forEach((feature, index) => {
                    const value = result.shap_values[index];
                    const impact = value > 0 ? 'positive' : 'negative';
                    shapHtml += `
                        <div class="col-md-6 mb-2">
                            <small>${feature}: <span class="text-${impact === 'positive' ? 'success' : 'danger'}">${value.toFixed(3)}</span></small>
                        </div>
                    `;
                });
                shapHtml += '</div>';
                document.getElementById('shapValues').innerHTML = shapHtml;
            }
            
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
