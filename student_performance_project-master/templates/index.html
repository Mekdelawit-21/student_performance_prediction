<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <h1>Predict Student's Final Exam Marks</h1>
    <div id="predictionForm">
        <input type="number" id="sem_present_count" placeholder="Semester Present Count">
        <input type="number" id="sem_absent_count" placeholder="Semester Absent Count">
        <input type="number" id="sem_eval_lec_test_1_mark" placeholder="Lecture Test 1 Mark">
        <input type="number" id="sem_eval_lab_test_1_mark" placeholder="Lab Test 1 Mark">
        <input type="number" id="semester_evaluation_mid_mark" placeholder="Mid Semester Mark">
        <input type="number" id="sem_eval_lec_test_2_mark" placeholder="Lecture Test 2 Mark">
        <input type="number" id="sem_eval_lab_test_2_mark" placeholder="Lab Test 2 Mark">
        <input type="number" id="semester_evaluation_pre_gtu_mark" placeholder="Pre GTU Mark">
        <input type="number" id="semester_evaluation_internal_mark" placeholder="Internal Mark">
        <button onclick="predict()">Predict Marks</button>
    </div>
    <div id="result">
        <p id="predictedFinalExamMarks"></p>
    </div>
    
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
