<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>

    <link rel="stylesheet" type="text/css" href="/Project-Student-Exam-Performance-Prediction/static/styles.css">
    
  <!-- <link rel="stylesheet" type="text/css" href="\static\styles.css">-->



</head>
<body>
    <div class="container">
        <h1>Student Performance Prediction</h1>
        
        <div class="form-group">
            <label for="studyHours">Study Hours:</label>
            <input type="number" id="studyHours" placeholder="Enter Study Hours" />
        </div>
        
        <div class="form-group">
            <label for="prevExamScore">Previous Exam Score:</label>
            <input type="number" id="prevExamScore" placeholder="Enter Previous Exam Score" />
        </div>
        
        <button onclick="predict()">Predict Pass/Fail</button>

        <div class="result">
            <p id="inputValues"></p> <!-- Display input values -->
            <p id="result"></p>
        </div>
    </div>

    <script src="/Project-Student-Exam-Performance-Prediction/templates/index.html"></script>
    
    <!--<script src="app.js"></script>-->
</body>
</html>
