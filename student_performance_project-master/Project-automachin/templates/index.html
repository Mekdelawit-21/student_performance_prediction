<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page">

        <div class="card">

            <!-- Card Header (inside card, no logo) -->
            <div class="card-header">
                <h1>Student Performance Prediction</h1>
                <p>Enter your semester details to predict your final GTU exam mark</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="step-label" id="stepLabel">Step 1 of 9</p>

            <!-- Steps -->
            <div id="stepContainer">

                <div class="step active" data-step="1">
                    <label>Semester Present Count</label>
                    <input type="number" id="sem_present_count" placeholder="e.g. 20" min="0">
                </div>

                <div class="step" data-step="2">
                    <label>Semester Absent Count</label>
                    <input type="number" id="sem_absent_count" placeholder="e.g. 3" min="0">
                </div>

                <div class="step" data-step="3">
                    <label>Lecture Test 1 Mark</label>
                    <input type="number" id="sem_eval_lec_test_1_mark" placeholder="e.g. 18" min="0">
                </div>

                <div class="step" data-step="4">
                    <label>Lab Test 1 Mark</label>
                    <input type="number" id="sem_eval_lab_test_1_mark" placeholder="e.g. 17" min="0">
                </div>

                <div class="step" data-step="5">
                    <label>Mid Semester Mark</label>
                    <input type="number" id="semester_evaluation_mid_mark" placeholder="e.g. 35" min="0">
                </div>

                <div class="step" data-step="6">
                    <label>Lecture Test 2 Mark</label>
                    <input type="number" id="sem_eval_lec_test_2_mark" placeholder="e.g. 19" min="0">
                </div>

                <div class="step" data-step="7">
                    <label>Lab Test 2 Mark</label>
                    <input type="number" id="sem_eval_lab_test_2_mark" placeholder="e.g. 16" min="0">
                </div>

                <div class="step" data-step="8">
                    <label>Pre GTU Mark</label>
                    <input type="number" id="semester_evaluation_pre_gtu_mark" placeholder="e.g. 60" min="0">
                </div>

                <div class="step" data-step="9">
                    <label>Internal Mark</label>
                    <input type="number" id="semester_evaluation_internal_mark" placeholder="e.g. 28" min="0">
                </div>

            </div>

            <!-- Navigation Buttons -->
            <div class="btn-row">
                <button class="btn btn-secondary" id="backBtn" onclick="prevStep()" style="display:none;">← Back</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextStep()">Next →</button>
                <button class="btn btn-success" id="predictBtn" onclick="predict()" style="display:none;">Predict Marks</button>
            </div>

            <!-- Result -->
            <div id="result" class="result" style="display:none;">
                <div class="result-icon">📊</div>
                <p class="result-label">Predicted GTU Mark</p>
                <p class="result-value" id="predictedFinalExamMarks"></p>
                <button class="btn btn-secondary" onclick="resetForm()">Start Over</button>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
